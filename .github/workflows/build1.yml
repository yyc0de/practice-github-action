name: Test and Build Workflow
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Run lint
        run: |
          echo "Running lint..."
          npm run lint


  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Run test
        run: |
          echo "Running test..."
          npm test

  Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install dependencies
        run: |
          echo "Installing dependencies..."
          npm ci

      - name: Run Build
        run: |
          echo "Building the code..."
          npm run build


      - name: Deploy code
        run: echo "Deploying..."
        
